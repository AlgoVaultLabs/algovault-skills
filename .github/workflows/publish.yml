name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  validate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ───────── Preflight (subset — CI cannot do gh repo create / live MCP probe) ─────────
      - name: Validate manifest schema
        run: npx -y ajv-cli@5 validate -s skills/manifest.schema.json -d skills/manifest.json

      - name: Generator emits 20/20 (dry-run)
        run: |
          node scripts/gen-skill.mjs --dry-run | tee /tmp/gen.log
          grep -q "GEN: 20/20" /tmp/gen.log

      - name: Verify generated SKILL.md count + integrity
        run: |
          test "$(ls skills/*/SKILL.md | wc -l | tr -d ' ')" = "20"
          # Data integrity: zero hits for forbidden internal-only fields
          ! grep -rE 'outcome_return_pct|outcome_price' skills/

      - name: Verify .claude-plugin/plugin.json
        run: |
          jq -e '.name == "algovault-skills"' .claude-plugin/plugin.json
          jq -e '.mcpServers.algovault.url == "https://api.algovault.com/mcp"' .claude-plugin/plugin.json

      # ───────── TEMP DIAG: env-var arrival ─────────
      - name: TEMP DIAG — env-var byte-shape probe
        env:
          SMITHERY_API_KEY: ${{ secrets.SMITHERY_API_KEY }}
        run: |
          echo "byte length: $(printf '%s' "$SMITHERY_API_KEY" | wc -c)"
          echo "first 5 bytes: $(printf '%s' "$SMITHERY_API_KEY" | head -c 5)"
          echo "last 5 bytes: $(printf '%s' "$SMITHERY_API_KEY" | tail -c 5)"
          echo "has \\r? $(printf '%s' "$SMITHERY_API_KEY" | grep -c $'\r' || echo 0)"
          echo "has trailing \\n? $(printf '%s' "$SMITHERY_API_KEY" | tail -c 1 | od -c | head -1)"
          echo "smithery CLI version: $(npx -y @smithery/cli@latest --version 2>&1 | tail -1)"
          # Check if env-var actually reaches the CLI
          echo "--- CLI auth whoami (should report token from env) ---"
          npx -y @smithery/cli@latest auth whoami 2>&1 || true

      # ───────── Smithery publish (gated on API key) ─────────
      # Smithery CLI v4.x: per-skill `skill publish`, namespace via --namespace flag,
      # auth via SMITHERY_API_KEY env var. Each manifest entry maps to skills/<slug>/SKILL.md.
      - name: Publish 20 skills to Smithery (if API key present)
        # DISTRIBUTION-CLOSEOUT-W1 R1: soft-fail on Smithery republish.
        # Smithery is already LIVE at https://smithery.ai/skills/algovault since
        # SKILLS-W1 v0.1.0 publish. The republish here is purely a no-op CI
        # exercise — when SMITHERY_API_KEY rotates / expires, this step will
        # 401 but distribution-closeout downstream steps (anthropics PR, etc)
        # have NO dependency on Smithery republish success. Soft-fail keeps
        # the workflow advancing while the failure remains visible in run logs
        # for ops attention. Remove this when SMITHERY_API_KEY is rotated and
        # the no-op republish reliably exits 0.
        continue-on-error: true
        env:
          SMITHERY_API_KEY: ${{ secrets.SMITHERY_API_KEY }}
        run: |
          if [ -z "$SMITHERY_API_KEY" ]; then
            echo "SKIP: SMITHERY_API_KEY not set in repo secrets — manual publish required"
            echo "    1. npx -y @smithery/cli auth login"
            echo "    2. for slug in \$(jq -r '.[].slug' skills/manifest.json); do"
            echo "         npx -y @smithery/cli skill publish ./skills/\$slug --namespace algovault"
            echo "       done"
            exit 0
          fi
          # DISTRIBUTION-CLOSEOUT-W1 R1: exit-code-primary success detection.
          # Prior version did `if cmd | grep -q "Updated skill"` which broke for
          # already-published skills (Smithery emits a different message on no-op
          # republish, e.g. "Already published" / "No changes" / etc — exact text
          # varies across CLI versions). Relying on grep meant 0 ok / 20 fail on
          # every workflow re-run after the initial v0.1.0 publish (run 25055785434).
          # New logic: success = exit 0 OR stdout matches a broadened pattern.
          # Captures stdout for diagnostic logging on real failures (not silently
          # swallowed by the pipe-to-grep pattern).
          # Note: GitHub Actions runs `bash -e {0}` by default, which would
          # abort the script on the first non-zero `npx` exit BEFORE we get to
          # capture `$?`. The `if cmd; then` wrapper around the assignment
          # swallows -e exactly the same way the prior `if cmd | grep` did,
          # while still letting us read the exit code from the `else` branch.
          OK=0; FAIL=0
          while IFS= read -r slug; do
            if PUBLISH_OUT=$(npx -y @smithery/cli skill publish "./skills/$slug" --namespace algovault 2>&1); then
              PUBLISH_EXIT=0
            else
              PUBLISH_EXIT=$?
            fi
            if [ "$PUBLISH_EXIT" = "0" ] || echo "$PUBLISH_OUT" | grep -qiE "updated skill|already published|no changes|up to date|already exists|published successfully"; then
              OK=$((OK+1)); echo "  ✓ algovault/$slug"
            else
              FAIL=$((FAIL+1)); echo "  ✗ algovault/$slug (exit=$PUBLISH_EXIT)"
              echo "$PUBLISH_OUT" | head -5 | sed 's/^/      /'
            fi
          done < <(jq -r '.[].slug' skills/manifest.json)
          echo "Smithery publish: $OK ok / $FAIL fail (expected 20/0)"
          test "$FAIL" = "0"

      # ───────── Anthropic official marketplace submission ─────────
      # DISTRIBUTION-CLOSEOUT-W1 R1 final state (2026-04-28 retro):
      # The fork-based PR flow we built here was DEAD-END — anthropics/claude-
      # plugins-official auto-rejects all community PRs with a github-actions
      # bot message pointing to a separate submission form at
      # https://form.claude.com/plugins/submit. That form's hostname is NOT
      # currently provisioned (NXDOMAIN per CF + Google DoH 2026-04-28).
      # Per CLAUDE.md "Never invent a third-party submission endpoint without
      # verifying it returns 200" — we don't auto-submit until DNS resolves.
      # This step now just prints the current submission status for ops
      # visibility. Operators can retry the form URL periodically.
      # Test PR for reference: https://github.com/anthropics/claude-plugins-official/pull/1632 (auto-closed).
      - name: Print Anthropic marketplace submission status
        run: |
          echo "═══ Anthropic Official Marketplace — submission status ═══"
          echo ""
          echo "anthropics/claude-plugins-official auto-rejects community PRs"
          echo "(github-actions bot closes them with: \"This repo only accepts"
          echo "contributions from Anthropic team members\"). Per the docs page"
          echo "https://code.claude.com/docs/en/plugins#submit-your-plugin-to-the-official-marketplace"
          echo "the new submission path is the form at:"
          echo ""
          echo "    https://form.claude.com/plugins/submit"
          echo ""
          echo "As of DISTRIBUTION-CLOSEOUT-W1 (2026-04-28), that hostname"
          echo "returned NXDOMAIN — Anthropic infra hasn't provisioned the"
          echo "form yet. Operators should retry the URL periodically and"
          echo "submit when DNS resolves."
          echo ""
          echo "Test PR for reference (auto-closed): https://github.com/anthropics/claude-plugins-official/pull/1632"
          echo ""
          echo "Status tracked in docs/MARKETPLACES.md row 3 (anthropics)."

      # ───────── Manual marketplaces (no public API) ─────────
      - name: Print manual-submission notice for claudemarketplaces.com + skillsmp.com
        run: |
          echo "MARKETPLACE_SUBMISSION_MANUAL: claudemarketplaces.com (no public API — see docs/SUBMIT_CLAUDEMARKETPLACES.md)"
          echo "MARKETPLACE_SUBMISSION_MANUAL: skillsmp.com (no public API — see docs/SUBMIT_SKILLSMP.md)"

      # ───────── Summary ─────────
      - name: Summary
        run: |
          echo "PUBLISH_DONE tag=${{ github.ref_name }} sha=${{ github.sha }}"
          echo "  - Manifest validated, 20 skills emit clean."
          echo "  - Smithery: published if token, else manual."
          echo "  - Anthropic PR: opened if token, else manual."
          echo "  - claudemarketplaces.com: MANUAL (no API)."
          echo "  - skillsmp.com: MANUAL (no API)."
