name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  validate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ───────── Preflight (subset — CI cannot do gh repo create / live MCP probe) ─────────
      - name: Validate manifest schema
        run: npx -y ajv-cli@5 validate -s skills/manifest.schema.json -d skills/manifest.json

      - name: Generator emits 20/20 (dry-run)
        run: |
          node scripts/gen-skill.mjs --dry-run | tee /tmp/gen.log
          grep -q "GEN: 20/20" /tmp/gen.log

      - name: Verify generated SKILL.md count + integrity
        run: |
          test "$(ls skills/*/SKILL.md | wc -l | tr -d ' ')" = "20"
          # Data integrity: zero hits for forbidden internal-only fields
          ! grep -rE 'outcome_return_pct|outcome_price' skills/

      - name: Verify .claude-plugin/plugin.json
        run: |
          jq -e '.name == "algovault-skills"' .claude-plugin/plugin.json
          jq -e '.mcpServers.algovault.url == "https://api.algovault.com/mcp"' .claude-plugin/plugin.json

      # ───────── Smithery publish (gated on API key) ─────────
      # Smithery CLI v4.x: per-skill `skill publish`, namespace via --namespace flag,
      # auth via SMITHERY_API_KEY env var. Each manifest entry maps to skills/<slug>/SKILL.md.
      - name: Publish 20 skills to Smithery (if API key present)
        env:
          SMITHERY_API_KEY: ${{ secrets.SMITHERY_API_KEY }}
        run: |
          if [ -z "$SMITHERY_API_KEY" ]; then
            echo "SKIP: SMITHERY_API_KEY not set in repo secrets — manual publish required"
            echo "    1. npx -y @smithery/cli auth login"
            echo "    2. for slug in \$(jq -r '.[].slug' skills/manifest.json); do"
            echo "         npx -y @smithery/cli skill publish ./skills/\$slug --namespace algovault"
            echo "       done"
            exit 0
          fi
          # DISTRIBUTION-CLOSEOUT-W1 R1: exit-code-primary success detection.
          # Prior version did `if cmd | grep -q "Updated skill"` which broke for
          # already-published skills (Smithery emits a different message on no-op
          # republish, e.g. "Already published" / "No changes" / etc — exact text
          # varies across CLI versions). Relying on grep meant 0 ok / 20 fail on
          # every workflow re-run after the initial v0.1.0 publish (run 25055785434).
          # New logic: success = exit 0 OR stdout matches a broadened pattern.
          # Captures stdout for diagnostic logging on real failures (not silently
          # swallowed by the pipe-to-grep pattern).
          # Note: GitHub Actions runs `bash -e {0}` by default, which would
          # abort the script on the first non-zero `npx` exit BEFORE we get to
          # capture `$?`. The `if cmd; then` wrapper around the assignment
          # swallows -e exactly the same way the prior `if cmd | grep` did,
          # while still letting us read the exit code from the `else` branch.
          OK=0; FAIL=0
          while IFS= read -r slug; do
            if PUBLISH_OUT=$(npx -y @smithery/cli skill publish "./skills/$slug" --namespace algovault 2>&1); then
              PUBLISH_EXIT=0
            else
              PUBLISH_EXIT=$?
            fi
            if [ "$PUBLISH_EXIT" = "0" ] || echo "$PUBLISH_OUT" | grep -qiE "updated skill|already published|no changes|up to date|already exists|published successfully"; then
              OK=$((OK+1)); echo "  ✓ algovault/$slug"
            else
              FAIL=$((FAIL+1)); echo "  ✗ algovault/$slug (exit=$PUBLISH_EXIT)"
              echo "$PUBLISH_OUT" | head -5 | sed 's/^/      /'
            fi
          done < <(jq -r '.[].slug' skills/manifest.json)
          echo "Smithery publish: $OK ok / $FAIL fail (expected 20/0)"
          test "$FAIL" = "0"

      # ───────── Anthropic claude-plugins-official PR (gated on token) ─────────
      # DISTRIBUTION-CLOSEOUT-W1 R1: full fork-based PR flow.
      # Prior version was a TODO stub that did `gh repo fork` then printed a
      # placeholder. Now: forks → branches → edits upstream marketplace.json →
      # commits → pushes → opens PR. Idempotent: skips if a PR is already open
      # OR if our entry already exists in upstream marketplace.json.
      # Auth: ANTHROPIC_PR_TOKEN must be a classic PAT with `public_repo` scope
      # (org-traversal works for classic; fine-grained needs org-policy enable —
      # see CLAUDE.md "Auth & narrow tokens" entry).
      - name: Open PR to anthropics/claude-plugins-official (if token present)
        env:
          ANTHROPIC_PR_TOKEN: ${{ secrets.ANTHROPIC_PR_TOKEN }}
          GH_TOKEN: ${{ secrets.ANTHROPIC_PR_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ -z "$ANTHROPIC_PR_TOKEN" ]; then
            echo "SKIP: ANTHROPIC_PR_TOKEN not set in repo secrets — manual PR required"
            echo "    See docs/MARKETPLACES.md for the manual PR template"
            exit 0
          fi

          # ─── Idempotency check 1: is our entry already merged upstream? ───
          UPSTREAM_JSON=$(gh api repos/anthropics/claude-plugins-official/contents/.claude-plugin/marketplace.json --jq '.content' | base64 -d)
          if echo "$UPSTREAM_JSON" | jq -e '.plugins[] | select(.name == "algovault-skills")' >/dev/null 2>&1; then
            echo "✓ algovault-skills already in upstream marketplace.json — nothing to do"
            exit 0
          fi

          # ─── Idempotency check 2: is a PR already open from a prior run? ───
          EXISTING_PR=$(gh pr list --repo anthropics/claude-plugins-official --search "algovault-skills in:title" --state open --json url --jq '.[0].url // ""')
          if [ -n "$EXISTING_PR" ]; then
            echo "✓ PR already open: $EXISTING_PR — nothing to do"
            exit 0
          fi

          # ─── Identify the actor (whose token are we acting as?) ───
          FORK_OWNER=$(gh api user --jq '.login')
          FORK_EMAIL="${FORK_OWNER}@users.noreply.github.com"
          echo "Acting as: $FORK_OWNER"

          # ─── Fork (idempotent — `gh repo fork` no-ops if fork already exists) ───
          gh repo fork anthropics/claude-plugins-official --clone=false || true
          # Wait briefly for fork to be ready (GH async)
          for i in 1 2 3 4 5; do
            if gh api "repos/$FORK_OWNER/claude-plugins-official" >/dev/null 2>&1; then break; fi
            sleep 3
          done

          # ─── Clone fork + sync to upstream main ───
          WORK=$(mktemp -d)
          git clone "https://${ANTHROPIC_PR_TOKEN}@github.com/$FORK_OWNER/claude-plugins-official.git" "$WORK/cpo"
          cd "$WORK/cpo"
          git config user.email "$FORK_EMAIL"
          git config user.name "$FORK_OWNER"
          git remote add upstream https://github.com/anthropics/claude-plugins-official.git
          git fetch upstream main
          git checkout -B add-algovault-skills upstream/main

          # ─── Append our plugin entry (idempotent jq merge) ───
          ENTRY_JSON=$(cat <<'JSON'
          {
            "name": "algovault-skills",
            "description": "20 Agent Skills over AlgoVault MCP — composite trade verdict (signal + confidence + regime + factors), funding-rate arbitrage scanning, and market regime detection across 5 exchanges (Hyperliquid, Binance, Bybit, OKX, Bitget). Every signal Merkle-anchored on Base L2 with public verification at /track-record.",
            "author": { "name": "AlgoVault Labs" },
            "category": "automation",
            "source": {
              "source": "url",
              "url": "https://github.com/AlgoVaultLabs/algovault-skills.git"
            },
            "homepage": "https://algovault.com"
          }
          JSON
          )
          jq --argjson entry "$ENTRY_JSON" '.plugins += [$entry]' .claude-plugin/marketplace.json > /tmp/mp.json
          mv /tmp/mp.json .claude-plugin/marketplace.json

          # ─── Verify edit landed cleanly + entry count went up by exactly 1 ───
          NEW_COUNT=$(jq '.plugins | length' .claude-plugin/marketplace.json)
          OLD_COUNT=$(echo "$UPSTREAM_JSON" | jq '.plugins | length')
          if [ "$NEW_COUNT" != "$((OLD_COUNT + 1))" ]; then
            echo "FAIL: plugin count went from $OLD_COUNT to $NEW_COUNT (expected $((OLD_COUNT + 1)))"
            exit 1
          fi

          # ─── Commit + push to fork ───
          git add .claude-plugin/marketplace.json
          git commit -m "Add algovault-skills (20 Agent Skills over AlgoVault MCP)"
          git push -f origin add-algovault-skills

          # ─── Open PR ───
          PR_BODY=$(cat <<'BODY'
          ## What

          Adds **algovault-skills** to the marketplace — a bundle of 20 Agent Skills wrapping AlgoVault MCP, a composite-verdict trading signal API for AI agents.

          ## Why

          AlgoVault gives crypto trading agents a one-call composite verdict (signal + confidence + market regime + factor breakdown) across 5 exchanges (Hyperliquid, Binance, Bybit, OKX, Bitget). Every signal is Merkle-anchored on Base L2 — publicly verifiable at https://algovault.com/track-record (~89.5% PFE WR across 58K+ signals as of 2026-04-28).

          The 20 Skills cover the common agent patterns: portfolio scanning, regime-aware trading, funding arbitrage detection, multi-timeframe confirmation, hedging, multi-agent coordination. See https://github.com/AlgoVaultLabs/algovault-skills/blob/main/README.md for the full catalog.

          ## Verification

          - **Live MCP endpoint:** `https://api.algovault.com/mcp` (returns `{"status":"ok"}` at `/health`)
          - **Live track record:** https://algovault.com/track-record
          - **Source:** https://github.com/AlgoVaultLabs/algovault-skills (MIT, public)
          - **Plugin manifest:** valid `.claude-plugin/marketplace.json` + `.claude-plugin/plugin.json`
          - **20 SKILL.md files:** all have valid YAML frontmatter (`name` + `description`)
          - **Already published:** Smithery (https://smithery.ai/skills/algovault), claudemarketplaces.com auto-discovery, skillsmp.com auto-discovery

          ## Maintenance

          Maintained by AlgoVault Labs. CI republishes on tag push (this PR was opened by the same workflow). Email: support@algovault.com.
          BODY
          )

          PR_URL=$(gh pr create \
            --repo anthropics/claude-plugins-official \
            --base main \
            --head "$FORK_OWNER:add-algovault-skills" \
            --title "Add algovault-skills (20 Agent Skills over AlgoVault MCP)" \
            --body "$PR_BODY")
          echo "✓ PR opened: $PR_URL"

      # ───────── Manual marketplaces (no public API) ─────────
      - name: Print manual-submission notice for claudemarketplaces.com + skillsmp.com
        run: |
          echo "MARKETPLACE_SUBMISSION_MANUAL: claudemarketplaces.com (no public API — see docs/SUBMIT_CLAUDEMARKETPLACES.md)"
          echo "MARKETPLACE_SUBMISSION_MANUAL: skillsmp.com (no public API — see docs/SUBMIT_SKILLSMP.md)"

      # ───────── Summary ─────────
      - name: Summary
        run: |
          echo "PUBLISH_DONE tag=${{ github.ref_name }} sha=${{ github.sha }}"
          echo "  - Manifest validated, 20 skills emit clean."
          echo "  - Smithery: published if token, else manual."
          echo "  - Anthropic PR: opened if token, else manual."
          echo "  - claudemarketplaces.com: MANUAL (no API)."
          echo "  - skillsmp.com: MANUAL (no API)."
