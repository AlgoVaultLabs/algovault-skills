name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  validate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ───────── Preflight (subset — CI cannot do gh repo create / live MCP probe) ─────────
      - name: Validate manifest schema
        run: npx -y ajv-cli@5 validate -s skills/manifest.schema.json -d skills/manifest.json

      - name: Generator emits 20/20 (dry-run)
        run: |
          node scripts/gen-skill.mjs --dry-run | tee /tmp/gen.log
          grep -q "GEN: 20/20" /tmp/gen.log

      - name: Verify generated SKILL.md count + integrity
        run: |
          test "$(ls skills/*/SKILL.md | wc -l | tr -d ' ')" = "20"
          # Data integrity: zero hits for forbidden internal-only fields
          ! grep -rE 'outcome_return_pct|outcome_price' skills/

      - name: Verify .claude-plugin/plugin.json
        run: |
          jq -e '.name == "algovault-skills"' .claude-plugin/plugin.json
          jq -e '.mcpServers.algovault.url == "https://api.algovault.com/mcp"' .claude-plugin/plugin.json

      # ───────── Smithery publish (gated on token) ─────────
      - name: Publish to Smithery (if token present)
        env:
          SMITHERY_TOKEN: ${{ secrets.SMITHERY_TOKEN }}
        run: |
          if [ -z "$SMITHERY_TOKEN" ]; then
            echo "SKIP: SMITHERY_TOKEN not set in repo secrets — manual publish required"
            echo "    1. npx -y @smithery/cli login"
            echo "    2. npx -y @smithery/cli publish ."
            exit 0
          fi
          npx -y @smithery/cli publish . --token "$SMITHERY_TOKEN"

      # ───────── Anthropic claude-plugins-official PR (gated on token) ─────────
      - name: Open PR to anthropics/claude-plugins-official (if token present)
        env:
          ANTHROPIC_PR_TOKEN: ${{ secrets.ANTHROPIC_PR_TOKEN }}
          GH_TOKEN: ${{ secrets.ANTHROPIC_PR_TOKEN || secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          if [ -z "$ANTHROPIC_PR_TOKEN" ]; then
            echo "SKIP: ANTHROPIC_PR_TOKEN not set in repo secrets — manual PR required"
            echo "    See docs/MARKETPLACES.md for the manual PR template"
            exit 0
          fi
          # Fork-based PR flow (we don't have direct commit on the upstream)
          gh repo fork anthropics/claude-plugins-official --clone --remote=false || true
          # ... (full PR body / fork sync logic would live here)
          echo "TODO: complete fork-based PR flow when ANTHROPIC_PR_TOKEN available"

      # ───────── Manual marketplaces (no public API) ─────────
      - name: Print manual-submission notice for claudemarketplaces.com + skillsmp.com
        run: |
          echo "MARKETPLACE_SUBMISSION_MANUAL: claudemarketplaces.com (no public API — see docs/SUBMIT_CLAUDEMARKETPLACES.md)"
          echo "MARKETPLACE_SUBMISSION_MANUAL: skillsmp.com (no public API — see docs/SUBMIT_SKILLSMP.md)"

      # ───────── Summary ─────────
      - name: Summary
        run: |
          echo "PUBLISH_DONE tag=${{ github.ref_name }} sha=${{ github.sha }}"
          echo "  - Manifest validated, 20 skills emit clean."
          echo "  - Smithery: published if token, else manual."
          echo "  - Anthropic PR: opened if token, else manual."
          echo "  - claudemarketplaces.com: MANUAL (no API)."
          echo "  - skillsmp.com: MANUAL (no API)."
